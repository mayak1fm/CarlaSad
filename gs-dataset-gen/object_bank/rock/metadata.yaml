class_id: 3
class_name: rock
semantic_category: static_obstacle
description: Large field rock or stone

canonical_scale: [0.8, 0.6, 0.5]
anchor_point: [0.0, 0.0, 0.0]

proxy_mesh: proxy/rock_convex.obj
convex_hull: proxy/rock_hull.obj
oriented_bbox:
  center: [0.0, 0.0, 0.25]
  size:   [0.8, 0.6, 0.5]
  rotation: [0.0, 0.0, 0.0]

support_polygon:
  - [-0.35, -0.25]
  - [ 0.35, -0.25]
  - [ 0.35,  0.25]
  - [-0.35,  0.25]

scale_variations:
  min_scale: 0.5
  max_scale: 3.0
  allow_non_uniform: true

placement_rules:
  terrain_classes_allowed: [100, 101, 102, 103, 104, 105]
  terrain_snap: true
  allow_partial_overlap: false
  allow_partial_burial: true     # rock can be partially in ground
  burial_fraction: [0.0, 0.3]

assets:
  - id: rock_granite_01
    splat: splats/rock_granite_01.ply
  - id: rock_granite_02
    splat: splats/rock_granite_02.ply
  - id: rock_limestone
    splat: splats/rock_limestone.ply
