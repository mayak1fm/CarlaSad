name: field_edge
description: Field boundary zone — transition between worked field and tree line / ditch
terrain_class: field_boundary
semantic_id: 105

weather_preset: CloudySunset
lighting:
  sun_elevation_deg: 18.0
  sun_azimuth_deg: 260.0
  sun_intensity: 0.6
  ambient_intensity: 0.4
  sky_luminance: 0.35
  color_temperature_k: 4800

terrain:
  surface_type: mixed          # short grass + bare soil at edge
  roughness: 0.45
  moisture: 0.3
  albedo_mean: [0.22, 0.26, 0.14]
  normal_variation: 0.15

background_splat: splats/field_edge_cloudy_sunset.ply

placement_bounds:
  x_min: -15.0
  x_max:  15.0
  y_min:   2.0
  y_max:  18.0
  z_ref:   0.0

valid_object_classes:
  - person
  - pole
  - rock
  - bush

placement_rules:
  min_object_spacing: 2.5
  avoid_terrain_classes: [107, 108]   # non_drivable, restricted_zone at edge
  z_snap: heightmap
  occlusion_policy: partial_ok

augmentation:
  hflip_prob: 0.5
  rotation_deg_range: [-10, 10]
  scale_jitter: 0.08
