name: field_sunset
description: Normal field at golden hour — strong directional shadows, warm color cast
terrain_class: normal_field
semantic_id: 100

weather_preset: ClearSunset
lighting:
  sun_elevation_deg: 8.0
  sun_azimuth_deg: 275.0
  sun_intensity: 0.85
  ambient_intensity: 0.25
  sky_luminance: 0.30
  color_temperature_k: 3200  # warm golden

terrain:
  surface_type: dry_soil
  roughness: 0.55
  moisture: 0.1
  albedo_mean: [0.30, 0.24, 0.14]   # warm-tinted under sunset
  normal_variation: 0.18

background_splat: splats/field_sunset.ply

placement_bounds:
  x_min: -20.0
  x_max:  20.0
  y_min:   5.0
  y_max:  30.0
  z_ref:   0.0

valid_object_classes:
  - person
  - tractor
  - pole
  - rock
  - bush
  - machinery

placement_rules:
  min_object_spacing: 3.5
  avoid_terrain_classes: [102, 103, 108]
  z_snap: heightmap
  occlusion_policy: partial_ok
  long_shadow: true   # shadows extend far at low sun angle

augmentation:
  hflip_prob: 0.5
  rotation_deg_range: [-20, 20]
  scale_jitter: 0.12
  lens_flare_prob: 0.15
