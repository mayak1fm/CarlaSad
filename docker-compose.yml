name: carlasad

x-carla-env: &carla-env
  CARLA_HOST: carla-runtime
  CARLA_PORT: "2000"

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: 1
            capabilities: [gpu]

# AMD GPU device mounts (used by carla-runtime on AMD systems)
# group_add uses numeric GIDs so they work inside containers without matching /etc/group
x-amd-gpu: &amd-gpu
  devices:
    - /dev/dri:/dev/dri
  group_add:
    - "44"   # video
    - "992"  # render

services:

  # ── CARLA Runtime ──────────────────────────────────────────────────────
  carla-runtime:
    build:
      context: .
      dockerfile: docker/carla-runtime/Dockerfile
    image: carlasad/carla-runtime:0.9.15
    container_name: carlasad-carla
    profiles: [runtime, dev, full]
    # GPU: set GPU_MODE=nvidia (default) or GPU_MODE=amd in .env
    # For AMD: uses x-amd-gpu devices; nvidia deploy section is ignored on AMD hosts
    <<: *amd-gpu
    environment:
      DISPLAY: ${DISPLAY:-:0}
      HEADLESS: ${HEADLESS:-true}
      # -nullrhi disables GPU rendering — lets CARLA server run on any hardware
      # Set CARLA_NULLRHI=false to enable rendering (requires compatible GPU + VRAM)
      CARLA_NULLRHI: ${CARLA_NULLRHI:-true}
    ports:
      - "2000:2000"
      - "2001:2001"
      - "2002:2002"
    volumes:
      - ./maps:/home/carla/CarlaUE4/Content/CarlaSad/Maps:ro
      - ./logs:/logs
      # X11 socket for display when HEADLESS=false
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2000"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  # ── CARLA Dev Build (компиляция форка из исходников) ──────────────────
  carla-dev:
    build:
      context: .
      dockerfile: docker/carla-dev/Dockerfile
    image: carlasad/carla-dev:latest
    container_name: carlasad-carla-dev
    profiles: [carla-build]
    <<: *gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      UE4_ROOT: /home/ue4/UnrealEngine
    volumes:
      - ./carla-fork:/workspace/carla
      - carla-build-cache:/workspace/carla/Build
      - carla-python-api:/carla-python-api
    working_dir: /workspace/carla
    command: ["bash", "-c", "echo 'CARLA dev container ready. Run: make CarlaUE4Editor'"]

  # ── ROS2 Bridge ────────────────────────────────────────────────────────
  ros2-bridge:
    build:
      context: .
      dockerfile: docker/ros2-bridge-dev/Dockerfile
    image: carlasad/ros2-bridge:latest
    container_name: carlasad-bridge
    profiles: [runtime, dev, ros, full]
    environment:
      <<: *carla-env
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
    depends_on:
      carla-runtime:
        condition: service_healthy
    volumes:
      - ./ros-bridge:/workspace/ros-bridge
      - ./maps:/maps:ro
      - ./logs:/logs
      - carla-python-api:/carla-python-api:ro
    network_mode: host
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        if [ -d /carla-python-api ]; then
          export PYTHONPATH=/carla-python-api:$$PYTHONPATH; fi &&
        cd /workspace/ros-bridge &&
        colcon build --symlink-install &&
        source install/setup.bash &&
        ros2 launch carlasad_bridge bridge.launch.py
      "
    restart: unless-stopped

  # ── API Backend ────────────────────────────────────────────────────────
  api-backend:
    build:
      context: .
      dockerfile: docker/api-backend-dev/Dockerfile
    image: carlasad/api-backend:latest
    container_name: carlasad-api
    profiles: [runtime, dev, api, full]
    environment:
      <<: *carla-env
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      LOG_DIR: /logs
    ports:
      - "8080:8080"
      - "50051:50051"
    volumes:
      - ./api-backend:/app
      - ./logs:/logs
      - ./maps:/maps:ro
      - carla-python-api:/carla-python-api:ro
    command: >
      bash -c "
        if ls /carla-python-api/*.egg 2>/dev/null; then
          export PYTHONPATH=/carla-python-api:$$PYTHONPATH; fi &&
        uvicorn main:app --host 0.0.0.0 --port 8080
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Dataset Generator ──────────────────────────────────────────────────
  dataset-gen:
    build:
      context: .
      dockerfile: docker/dataset-gen-dev/Dockerfile
    image: carlasad/dataset-gen:latest
    container_name: carlasad-dataset-gen
    profiles: [dataset-gen, full]
    <<: *gpu
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - ./gs-dataset-gen:/workspace/gs-dataset-gen
      - ./datasets:/datasets
      - ./maps:/maps:ro
    working_dir: /workspace/gs-dataset-gen
    command: echo "Dataset gen container ready. Run pipeline.py manually."

  # ── Reconstruction Tools ───────────────────────────────────────────────
  reconstruction:
    build:
      context: .
      dockerfile: docker/reconstruction-dev/Dockerfile
    image: carlasad/reconstruction:latest
    container_name: carlasad-reconstruction
    profiles: [reconstruction]
    <<: *gpu
    volumes:
      - ./tools/reconstruction:/workspace/reconstruction
      - ./maps:/maps
      - reconstruction-data:/data
    working_dir: /workspace/reconstruction
    command: echo "Reconstruction container ready."

  # ── Tools (replay, tests, scenario runner) ─────────────────────────────
  tools:
    build:
      context: .
      dockerfile: docker/tools-dev/Dockerfile
    image: carlasad/tools:latest
    container_name: carlasad-tools
    profiles: [tools, replay, full]
    environment:
      <<: *carla-env
    volumes:
      - ./carla-fork/PythonAPI:/workspace/PythonAPI
      - ./scenarios:/scenarios
      - ./logs:/logs
      - ./datasets:/datasets
      - carla-python-api:/carla-python-api:ro
    working_dir: /workspace
    command: echo "Tools container ready."

volumes:
  carla-build-cache:
  carla-python-api:
  reconstruction-data:
