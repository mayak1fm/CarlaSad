name: dynamic_actors_field
description: >
  Field scenario with pedestrians on dynamic pose-bank clips and stationary machinery.
  Terrain physics applied to tractor (normal_field, wet edges).

seed: 42
duration_seconds: 180.0

carla_host: localhost
carla_port: 2000
map_name: CarlaSad_Field_01
weather_preset: ClearNoon
logging_mode: dataset_recording

tractor_spawn:
  x: 0.0
  y: 0.0
  z: 0.5
  yaw: 0.0

terrain_config: configs/terrain/field_main.yaml

pedestrians:
  - {x:  8.0, y:  3.0, z: 0.5, yaw:  45.0}   # approaches from right
  - {x: -5.0, y: 12.0, z: 0.5, yaw: 270.0}   # walks across
  - {x: 15.0, y: -4.0, z: 0.5, yaw: 180.0}   # walks away from camera
  - {x:  3.0, y: 20.0, z: 0.5, yaw:  90.0}   # distant, behind tractor

machinery:
  - {x: 20.0, y:  8.0, z: 0.5, yaw:  0.0}    # stationary seeder
  - {x: -10.0, y: 15.0, z: 0.5, yaw: 90.0}   # stationary sprayer
